<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="google" content="notranslate">
  <title>chatroom — TalkBridge</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="chat-layout">
    <!-- ── 채팅 헤더 ── -->
    <div class="chat-header">
      <div>
        <div class="code-badge" id="header-code"></div>
        <!-- 참여자 수: 클릭 시 참여자 목록 패널 열림 -->
        <div class="room-info" id="user-count-wrap" title="참여자 목록 보기">0 online</div>
      </div>
      <!-- 헤더 우측: 번역 선택 + 테마 버튼 + 나가기 버튼 -->
      <div class="header-actions">
        <div class="translate-wrap">
          <select id="lang-select" aria-label="Choose language">
            <option value="" id="opt-translate-off">Translate off</option>
          </select>
        </div>
        <!-- 🚪 나가기 버튼 — 퇴장 확인 모달 트리거 -->
        <button class="btn-leave" id="btn-leave" title="Leave">🚪</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <!-- 드래그 앤 드롭 오버레이 -->
    <div id="drag-overlay"></div>

    <!-- 입력 중 표시 -->
    <div id="typing-indicator"></div>

    <div class="chat-input-wrap">
      <button id="btn-file" title="파일 첨부">📎</button>
      <input type="file" id="file-input" accept="*/*" style="display:none">
      <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" maxlength="1000">
      <button id="btn-send">Send</button>
    </div>
  </div>

  <!-- ================================================================
       참여자 목록 패널 (오른쪽에서 슬라이드인)
       user-count-wrap 클릭 시 open 클래스가 토글됨
       ================================================================ -->
  <!-- 패널 배경 클릭 시 닫힘 -->
  <div id="participants-backdrop"></div>
  <div id="participants-panel">
    <div class="panel-header">
      <span id="panel-title">참여자</span>
      <button class="panel-close" id="btn-close-panel">✕</button>
    </div>
    <!-- JS에서 participant-tag 요소들을 동적으로 추가 -->
    <div id="participants-list"></div>
    <!-- 초대 버튼: 참여자 목록 아래 고정 -->
    <button id="btn-invite" class="btn-invite">🔗 초대하기</button>
  </div>

  <!-- ================================================================
       긴 메시지 전체보기 오버레이
       300자 이상 메시지의 "전체 보기" 버튼 클릭 시 표시
       ================================================================ -->
  <div id="text-overlay">
    <div class="text-overlay-box">
      <div id="text-overlay-content" class="text-overlay-content"></div>
      <button class="text-overlay-close" id="btn-close-text-overlay">닫기</button>
    </div>
  </div>

  <!-- ================================================================
       비밀방 — 입장 대기 화면
       join-pending 소켓 이벤트 수신 시 표시
       join-approved 시 숨김 / join-denied 시 메시지 표시 후 홈으로
       ================================================================ -->
  <div id="waiting-screen">
    <div class="waiting-spinner"></div>
    <div class="waiting-title" id="waiting-title">입장 승인 대기 중</div>
    <div class="waiting-sub" id="waiting-sub">호스트가 입장을 승인할 때까지 기다려주세요.</div>
  </div>

  <!-- ================================================================
       비밀방 — 호스트용 입장 요청 승인 모달
       room-join-request 소켓 이벤트 수신 시 표시 (호스트에게만)
       여러 요청이 순차적으로 쌓이면 큐(queue)로 처리
       ================================================================ -->
  <div id="join-request-modal">
    <div class="join-request-box">
      <div class="join-request-name" id="join-request-name"></div>
      <div class="join-request-sub" id="join-request-sub">입장을 요청했습니다.</div>
      <div class="join-request-actions">
        <button class="btn-approve" id="btn-approve">승인</button>
        <button class="btn-deny" id="btn-deny">거절</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       파일 다운로드 보안 확인 모달 (테마 CSS 변수 연동)
       ================================================================ -->
  <div id="dl-modal" style="display:none; position:fixed; inset:0; background:var(--overlay-bg);
       z-index:1000; align-items:center; justify-content:center; padding:24px;">
    <div id="dl-modal-inner">
      <div style="font-size:2rem; text-align:center; margin-bottom:8px;">⚠️</div>
      <h3 id="dl-modal-title" style="font-size:1rem; font-weight:700; margin-bottom:8px; text-align:center;"></h3>
      <p id="dl-modal-desc"></p>
      <div class="dl-btn-wrap">
        <button id="dl-modal-cancel" class="dl-btn-cancel"></button>
        <button id="dl-modal-confirm" class="dl-btn-confirm"></button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       이미지 전체화면 오버레이 (라이트박스)
       ================================================================ -->
  <div id="img-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
       z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
    <button id="img-overlay-close" style="position:absolute; top:16px; right:16px;
            background:none; border:none; color:#fff; font-size:2rem; cursor:pointer;
            width:auto; padding:4px 12px;">✕</button>
    <img id="img-overlay-img" src="" alt="" style="max-width:95vw; max-height:90vh; object-fit:contain; border-radius:8px;">
  </div>

  <!-- ================================================================
       퇴장 확인 모달
       나가기 버튼 클릭 또는 뒤로가기 시 표시
       채팅 내역·파일이 모두 삭제됨을 공지
       ================================================================ -->
  <div id="leave-modal" style="display:none; position:fixed; inset:0; background:var(--overlay-bg);
       z-index:2100; align-items:center; justify-content:center; padding:24px;">
    <div id="leave-modal-inner">
      <div style="font-size:2rem; text-align:center; margin-bottom:8px;">🚪</div>
      <h3 id="leave-modal-title" style="font-size:1rem; font-weight:700; margin-bottom:8px; text-align:center;"></h3>
      <p id="leave-modal-desc" style="font-size:0.88rem; color:var(--text-secondary); text-align:center; margin-bottom:16px; white-space:pre-line;"></p>
      <div class="dl-btn-wrap">
        <button id="leave-modal-stay"    class="dl-btn-cancel"></button>
        <button id="leave-modal-confirm" class="dl-btn-confirm" style="background:var(--danger, #ef4444);"></button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       강퇴 확인 모달
       참여자 패널의 강퇴 버튼 클릭 시 표시
       ================================================================ -->
  <div id="kick-modal" style="display:none; position:fixed; inset:0; background:var(--overlay-bg);
       z-index:2100; align-items:center; justify-content:center; padding:24px;">
    <div id="kick-modal-inner">
      <div style="font-size:2rem; text-align:center; margin-bottom:8px;">🚫</div>
      <h3 id="kick-modal-title" style="font-size:1rem; font-weight:700; margin-bottom:8px; text-align:center;"></h3>
      <div class="dl-btn-wrap">
        <button id="kick-modal-cancel" class="dl-btn-cancel"></button>
        <button id="kick-modal-confirm" class="dl-btn-confirm" style="background:var(--danger, #ef4444);"></button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       초대 QR 오버레이 — 참여자 패널의 초대하기 버튼 클릭 시 표시
       QR 이미지: /api/room/{code}/qr, 방 코드도 함께 표시
       ================================================================ -->
  <div id="invite-overlay" style="display:none; position:fixed; inset:0;
       background:rgba(0,0,0,0.65); z-index:2200;
       align-items:center; justify-content:center; padding:24px;">
    <div id="invite-box" style="background:var(--card-bg, #fff); border-radius:20px;
         padding:28px 24px; max-width:320px; width:100%; text-align:center;
         box-shadow:0 8px 40px rgba(0,0,0,0.25); position:relative;">
      <button id="invite-close" style="position:absolute; top:12px; right:14px;
              background:none; border:none; font-size:1.4rem; cursor:pointer;
              color:var(--text-secondary,#888); width:auto; padding:2px 8px;">✕</button>
      <h3 id="invite-title" style="font-size:1rem; font-weight:700; margin:0 0 16px;">
        초대하기
      </h3>
      <img id="invite-qr" src="" alt="QR" style="width:200px; height:200px;
           border-radius:12px; display:block; margin:0 auto 16px;">
      <p style="font-size:0.8rem; color:var(--text-secondary,#888); margin:0 0 6px;"
         id="invite-code-label">방 번호</p>
      <div id="invite-code" style="font-size:1.6rem; font-weight:800; letter-spacing:4px;
           color:var(--accent,#4f46e5); font-family:monospace;"></div>
    </div>
  </div>

  <!-- BUG-08: 소켓 연결 실패 배너 (기본 hidden) -->
  <div id="connect-error-banner" style="display:none; position:fixed; top:0; left:0; right:0;
       background:#ef4444; color:#fff; text-align:center; padding:10px 16px; font-size:0.88rem;
       z-index:2000; font-weight:600;">
    ⚠ Connection lost. Trying to reconnect…
  </div>

  <script>
    // dvh 미지원 구형 기기 대응: window.innerHeight로 실제 뷰포트 높이를 CSS 변수에 주입
    function setRealVh() {
      document.documentElement.style.setProperty('--real-vh', (window.innerHeight * 0.01) + 'px');
    }
    setRealVh();
    window.addEventListener('resize', setRealVh);
  </script>
  <script src="/socket.io.min.js"></script>
  <script src="/client.js"></script>
</body>
</html>
