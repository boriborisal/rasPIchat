<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkBridge</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* 홈화면 전용 스타일 — 피처 아이콘 목록 */
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 8px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: var(--text-secondary);
    }
    .feature-icon {
      font-size: 1.1rem;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .app-brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .app-brand h1 {
      margin-bottom: 0;
    }
    .app-brand .brand-tag {
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      padding: 2px 7px;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 앱 이름 + 태그 -->
    <div class="app-brand">
      <h1>TalkBridge</h1>
      <span class="brand-tag">BETA</span>
    </div>

    <!-- 한 줄 소개 -->
    <p class="subtitle">Instant rooms. Live translation. No account needed.</p>

    <!-- 기능 하이라이트 -->
    <div class="card feature-list">
      <div class="feature-item">
        <span class="feature-icon">🌐</span>
        Real-time translation in 17 languages
      </div>
      <div class="feature-item">
        <span class="feature-icon">⚡</span>
        Join instantly with a 6-digit room code or QR
      </div>
      <div class="feature-item">
        <span class="feature-icon">🔒</span>
        Secret rooms with host approval
      </div>
      <div class="feature-item">
        <span class="feature-icon">📎</span>
        File & image sharing up to 5 MB
      </div>
      <div class="feature-item">
        <span class="feature-icon">🎨</span>
        6 color themes, works on any device
      </div>
    </div>

    <!-- 방 만들기 -->
    <div class="card">
      <button class="btn btn-primary gap-12" id="btn-create">Create Room</button>
    </div>

    <div class="divider">or</div>

    <!-- 방 참가 -->
    <div class="card">
      <input type="text" id="input-code" placeholder="Enter 6-digit room code" maxlength="6"
             style="text-transform:uppercase" class="gap-12">
      <button class="btn btn-secondary" id="btn-join">Join</button>
      <p class="error-msg" id="error-msg" style="display:none"></p>
    </div>

  </div>

  <script>
    // 방 생성 버튼 — POST /api/room 호출 후 host 페이지로 이동
    document.getElementById('btn-create').addEventListener('click', async () => {
      const res = await fetch('/api/room', { method: 'POST' });
      if (!res.ok) {
        showError('Failed to create room. Please try again.');
        return;
      }
      const data = await res.json();
      location.href = `/room/${data.code}/host`;
    });

    // 방 입장 버튼 — GET /api/room/:code 로 방 존재 확인 후 join 페이지로 이동
    document.getElementById('btn-join').addEventListener('click', async () => {
      const code = document.getElementById('input-code').value.trim().toUpperCase();
      if (code.length !== 6) {
        showError('Please enter a 6-digit code.');
        return;
      }
      const res = await fetch(`/api/room/${code}`);
      if (res.ok) {
        location.href = `/room/${code}/join`;
      } else {
        showError('Room not found.');
      }
    });

    // Enter 키로 입장 버튼 동작
    document.getElementById('input-code').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-join').click();
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
